services:
  backend:
    build:
      context: .
      dockerfile: infra/dockerfiles/backend.Dockerfile
      target: dev
    ports:
      - "3001:3001"
    env_file:
      - ./apps/server/.env

  frontend:
    build:
      context: .
      dockerfile: infra/dockerfiles/frontend.Dockerfile
      target: dev
    depends_on:
      - backend
    ports:
      - "5173:5173"
    env_file:
      - ./apps/client/.env
