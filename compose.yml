services:
  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
      target: production
    # No host port: API only via frontend nginx /api/ (add "3001:3001" temporarily for local debugging).
    env_file:
      - ./apps/server/.env
    volumes:
      - ./apps/server/src/:/app/apps/server/src/
      - ./apps/server/tsconfig.json/:/app/apps/server/tsconfig.json

  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
      target: runner
      args:
        VITE_API_URL: ""
        VITE_GOOGLE_CLIENT_ID: 520618371557-k3fj090l0rprsmg9vgucjrs4vpng0hqm.apps.googleusercontent.com
    depends_on:
      - backend
    ports:
      - 3000:3000
    env_file:
      - ./apps/client/.env
    environment:
      VITE_GOOGLE_CLIENT_ID: 520618371557-k3fj090l0rprsmg9vgucjrs4vpng0hqm.apps.googleusercontent.com
      # Empty = same-origin /api/ (proxied by nginx). Do not point at :3001 or the browser bypasses nginx.
      VITE_API_URL: ""
    volumes:
      - ./apps/client/src/:/app/apps/client/src/
      - ./apps/client/index.html:/app/apps/client/index.html
      - ./apps/client/tsconfig.app.json/:/app/apps/client/tsconfig.app.json
      - ./apps/client/tsconfig.json/:/app/apps/client/tsconfig.json
      - ./apps/client/tsconfig.node.json/:/app/apps/client/tsconfig.node.json
